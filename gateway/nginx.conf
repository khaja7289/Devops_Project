events {}

http {
  log_format main '$remote_addr - $remote_user [$time_local] '
                '"$request" $status $body_bytes_sent '
                '"$http_user_agent"';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;

  server {
    listen 80;

    location /auth/ {
      limit_req zone=api_limit burst=2 nodelay;

      # Force correct status code
      limit_req_status 429;

      proxy_pass http://auth-service:3000/;
    }

    # Custom response for 429
    error_page 429 = /429.json;

    location = /429.json {
      return 429 '{"message":"Too many requests, try again later"}';
      add_header Content-Type application/json;
    }
  }
}
