services:
  k6:
    image: grafana/k6:latest
    working_dir: /tests
    volumes:
      - ./PerformanceTesting:/tests:rw
    environment:
      BASE_URL: ${BASE_URL:-http://api-gateway:80}
      USER_EMAIL: ${USER_EMAIL:-admin@gmail.com}
      USER_PASSWORD: ${USER_PASSWORD:-admin123}
      USER_ROLE: ${USER_ROLE:-admin}
    depends_on:
      - api-gateway
