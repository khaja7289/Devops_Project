services:
  k6:
    image: grafana/k6:latest
    working_dir: /tests
    volumes:
      - ./PerformanceTesting:/tests:rw
    environment:
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      USER_EMAIL: ${USER_EMAIL:-admin@gmail.com}
      USER_PASSWORD: ${USER_PASSWORD:-admin123}
      USER_ROLE: ${USER_ROLE:-admin}
