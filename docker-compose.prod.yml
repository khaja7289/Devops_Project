services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: udemy_devops
    ports:
      - "5432:5432"
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  flyway:
    image: flyway/flyway:latest
    container_name: flyway-prod
    command: -url=jdbc:postgresql://postgres:5432/udemy_devops -user=postgres -password=postgres -locations=filesystem:/flyway/sql migrate
    volumes:
      - ./services/auth-service/migrations:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/udemy_devops
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_LOCATIONS: filesystem:/flyway/sql

  auth-service:
    image: khaja7289/devops-project-pipeline:auth-service
    container_name: auth-service-prod
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: udemy_devops
      DB_PORT: 5432
      PORT: 3000
      NODE_ENV: production
      LOG_LEVEL: warn
      LOG_FORMAT: json
    secrets:
      - jwt_secret
      - jwt_refresh_secret
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always
    command: sh -c 'export JWT_SECRET=$$(cat /run/secrets/jwt_secret) && export JWT_REFRESH_SECRET=$$(cat /run/secrets/jwt_refresh_secret) && node index.js'

  api-gateway:
    image: khaja7289/devops-project-pipeline:api-gateway
    container_name: api-gateway-prod
    ports:
      - "8080:80"
      - "443:443"
    depends_on:
      auth-service:
        condition: service_healthy
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/auth/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  prometheus:
    image: khaja7289/devops-project-pipeline:prometheus
    container_name: prometheus-prod
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data-prod:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-prod
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data-prod:/var/lib/grafana
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter-prod
    ports:
      - "9101:9100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/metrics"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

volumes:
  pgdata-prod:
  prometheus_data-prod:
  grafana_data-prod:

secrets:
  jwt_secret:
    file: ./services/auth-service/secrets/jwt_secret.txt
  jwt_refresh_secret:
    file: ./services/auth-service/secrets/jwt_refresh_secret.txt
