version: '3.8'

services:
  postgres-test:
    image: postgres:15
    container_name: postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_db
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway-test:
    build:
      context: .
      dockerfile: flyway.Dockerfile
    image: devops-project-flyway-test
    container_name: flyway-test
    command: -url=jdbc:postgresql://postgres-test:5432/test_db -user=postgres -password=postgres -locations=filesystem:/flyway/sql migrate
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres-test:5432/test_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
