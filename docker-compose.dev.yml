version: '3.8'

# Development Environment - Local development setup
# Use: docker-compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:15
    container_name: postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: udemy_devops
    ports:
      - "5433:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  flyway:
    build:
      context: .
      dockerfile: flyway.Dockerfile
    image: devops-project-flyway-dev
    container_name: flyway-dev
    command: -url=jdbc:postgresql://postgres:5432/udemy_devops -user=postgres -password=postgres -locations=filesystem:/flyway/sql migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/udemy_devops
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: postgres
      FLYWAY_LOCATIONS: filesystem:/flyway/sql

  auth-service:
    image: khaja7289/devops-project-pipeline:auth-service
    container_name: auth-service-dev
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: udemy_devops
      DB_PORT: 5432
      PORT: 3000
      NODE_ENV: development
      LOG_LEVEL: debug
      LOG_FORMAT: json
    volumes:
      - ./services/auth-service:/app
    secrets:
      - jwt_secret
      - jwt_refresh_secret
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  api-gateway:
    image: khaja7289/devops-project-pipeline:api-gateway
    container_name: api-gateway-dev
    ports:
      - "8080:80"
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/auth/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: khaja7289/devops-project-pipeline:prometheus
    container_name: prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data-dev:/prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana
    container_name: grafana-dev
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data-dev:/var/lib/grafana
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter-dev
    ports:
      - "9101:9100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata-dev:
  prometheus_data-dev:
  grafana_data-dev:

secrets:
  jwt_secret:
    file: ./services/auth-service/secrets/jwt_secret.txt
  jwt_refresh_secret:
    file: ./services/auth-service/secrets/jwt_refresh_secret.txt
