services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: udemy_devops
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./services/auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  auth-service:
    image: khaja7289/devops-project-pipeline:auth-service
    container_name: auth-service
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    env_file:
      - ./services/auth-service/.env

  api-gateway:
    image: khaja7289/devops-project-pipeline:api-gateway
    container_name: api-gateway
    ports:
      - "8080:80"
    depends_on:
      - auth-service

  prometheus:
    image: khaja7289/devops-project-pipeline:prometheus
    container_name: prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9101:9100"

volumes:
  pgdata:
